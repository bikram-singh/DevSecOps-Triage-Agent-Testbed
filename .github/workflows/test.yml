name: Test Pipeline
on: [push]

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Simulate a failure
        run: exit 1

  missing-file-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Read a config file that does not exist
        run: cat config/does-not-exist.yaml

  triage-on-failure:
    needs: [build, missing-file-check]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER_NONPROD }}
          service_account: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT_NONPROD }}

      - name: Call triage agent
        run: |
          TOKEN=$(gcloud auth print-identity-token)
          curl -s -X POST \
            "https://us-central1-aiplatform.googleapis.com/v1/projects/946672491110/locations/us-central1/reasoningEngines/8412476164056023040:streamQuery?alt=sse" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "class_method": "async_stream_query",
              "input": {
                "message": "A GitHub Actions run failed. owner=bikram-singh repo=DevSecOps-Triage-Agent-Testbed run_id='"${{ github.run_id }}"'"
              }
            }' > triage_raw.txt
          cat triage_raw.txt

      - name: Extract triage text
        run: |
          grep -o '"text": *"[^"]*"' triage_raw.txt | tail -1 | sed 's/"text": *"//;s/"$//' > triage_text.txt || echo "Triage response could not be parsed" > triage_text.txt
          cat triage_text.txt

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const triageText = fs.readFileSync('triage_text.txt', 'utf8');
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `**🤖 Triage report**\n\n${triageText}`
            });