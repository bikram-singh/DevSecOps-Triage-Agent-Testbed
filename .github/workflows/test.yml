name: Test Pipeline
on:
  push:
  pull_request:

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Simulate a failure
        run: exit 1

  missing-file-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Read a config file that does not exist
        run: cat config/does-not-exist.yaml

  triage-on-failure:
    needs: [build, missing-file-check]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER_NONPROD }}
          service_account: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT_NONPROD }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install agents-cli
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          pip install google-agents-cli

      - name: Call triage agent
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          agents-cli run \
            "A GitHub Actions run failed. owner=bikram-singh repo=DevSecOps-Triage-Agent-Testbed run_id=${{ github.run_id }}" \
            --url https://us-central1-aiplatform.googleapis.com/v1/projects/946672491110/locations/us-central1/reasoningEngines/8412476164056023040 \
            --mode adk \
            --app-name app \
            > triage_raw.txt
          cat triage_raw.txt

      - name: Extract triage text
        run: |
          sed -n '/\[devsecops_triage_agent\]:/,/^Session:/p' triage_raw.txt | sed '$d' | sed '1s/.*\[devsecops_triage_agent\]: *//' > triage_text.txt
          cat triage_text.txt

      - name: Upload raw response
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: triage-raw-response
          path: triage_raw.txt

      - name: Extract triage text
        run: |
          tail -20 triage_raw.txt > triage_text.txt
          cat triage_text.txt

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const triageText = fs.readFileSync('triage_text.txt', 'utf8');
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `**🤖 Triage report**\n\n${triageText}`
            });